<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瘦身打卡管理</title>
<link rel="stylesheet" href="styles/main.css">
</head>
<body>

<header>
  <h1>瘦身打卡管理</h1>
  <div class="header-right">
    <input type="text" placeholder="搜索记录..." class="search">
    <button class="add-btn">+ 新增记录</button>
  </div>
</header>

<div class="container">
  <nav class="sidebar">
    <ul>
      <li class="active">统计总览</li>
      <li>打卡记录</li>
      <li>个人设置</li>
    </ul>
  </nav>

  <main class="content">
    <div class="cards">
      <div class="card">
        <h3>今日待完成</h3>
        <p>1项</p >
      </div>
      <div class="card">
        <h3>今日已完成</h3>
        <p>3 项</p >
      </div>
    </div>

    <div class="task-list-box">
      <h2>近期瘦身记录</h2>
      <div class="task-item">
        <div>
          <h4>晨跑 3km</h4>
          <p>日期：2026-04-21</p >
        </div>
        <span class="state done">已完成</span>
      </div>
      <div class="task-item">
        <div>
          <h4>控制晚餐热量</h4>
          <p>日期：2026-04-21</p >
        </div>
        <span class="state doing">进行中</span>
      </div>
      <div class="task-item">
        <div>
          <h4>力量训练 20 分钟</h4>
          <p>日期：2026-04-20</p >
        </div>
        <span class="state done">已完成</span>
      </div>
      <div class="task-item">
        <div>
          <h4>跳绳 15 分钟</h4>
          <p>日期：2026-04-19</p >
        </div>
        <span class="state done">已完成</span>
      </div>
    </div>

    <div class="tips-box">
      <h3>今日瘦身小贴士</h3>
      <p>多喝水、少糖少油、保证睡眠，瘦身效率更高。</p >
    </div>
  </main>
</div>

</body>
</html>
